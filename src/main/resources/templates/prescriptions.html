<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mx-auto">
    <h1 class="text-center">Danh sách đơn thuốc</h1>
    <div class="d-flex justify-content-between align-items-center mt-3">
        <form th:action="@{/prescriptions}" method="get">
            <input type="text" name="search" placeholder="Tìm kiếm..." class="form-control">
        </form>
        <a th:href="@{/add-prescription}" class="btn btn-primary">Thêm đơn thuốc</a>
    </div>
    <table class="mx-auto mt-3 table table-striped">
        <thead>
        <tr>
        <tr>
            <th scope="col">Mã đơn thuốc</th>
            <th scope="col">Tên bệnh nhân</th>
            <th scope="col">Tên bác sĩ</th>
            <th scope="col">Số lượng thuốc</th>
            <th scope="col">Mô tả</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${list}">
            <td th:text="${p.id}"></td>
            <th th:text="${p.patientName}"></th>
            <td th:text="${p.doctorName}"></td>
            <td th:text="${p.quantity}"></td>
            <td th:text="${p.description}"></td>
        </tr>
        </tbody>
    </table>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
